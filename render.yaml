services:
  - type: web
    name: cognora
    runtime: node
    region: oregon
    plan: free

    buildCommand: npm install --prefix Frontend && npm run build --prefix Frontend && npm install --prefix Backend

    startCommand: node Backend/index.js

    envVars:
      - key: NODE_ENV
        value: production

      # - key: DOWNLOAD_WIN_URL
      #   value: https://github.com/<your-username>/cognora/releases/download/v1.0.0/Cognora-Setup.exe
      # - key: DOWNLOAD_MAC_URL
      #   value: https://github.com/<your-username>/cognora/releases/download/v1.0.0/Cognora.dmg

    healthCheckPath: /api/health